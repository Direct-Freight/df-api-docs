delete:
  parameters:
    - in: header
      name: end-user-token
      required: true
      type: string
  responses:
    '204':
      description: success operation
  summary: STAGE=UNK Delete the profile.
  tags:
    - profiles
get:
  parameters:
    - in: header
      name: end-user-token
      required: true
      type: string
    - description: >-
        Look up the profile for this user_id instead of the logged in user.
        Takes precedence over email.
      in: query
      name: user_id
      required: false
      type: integer
    - description: >-
        Look up the profile for the user with this email instead of the logged
        in user. Ignored if user_id is also provided.
      in: query
      name: email
      required: false
      type: string
  responses:
    '200':
      description: successful operation
      schema:
        $ref: '#/definitions/profile_object'
    '404':
      description: No matching user or profile was found for the provided user_id or email.
  summary: >-
    Request a user's profile. Defaults to the logged in user, or pass user_id or
    email to look up any profile.
  tags:
    - profiles
patch:
  description: Please send in at least one field to be updated.
  parameters:
    - in: header
      name: end-user-token
      required: true
      type: string
    - in: body
      name: body
      required: true
      schema:
        $ref: '#/definitions/profile_object_patch'
  responses:
    '200':
      description: successful operation
      schema:
        $ref: '#/definitions/profile_object_patch'
  summary: Update profile information.
  tags:
    - profiles
post:
  parameters:
    - in: header
      name: end-user-token
      required: true
      type: string
    - in: body
      name: body
      required: true
      schema:
        $ref: '#/definitions/profile_object'
  responses:
    '200':
      description: successful operation
      schema:
        $ref: '#/definitions/profile_object_patch'
  summary: Create a new profile.
  tags:
    - profiles
x-restlet:
  section: PROFILES
